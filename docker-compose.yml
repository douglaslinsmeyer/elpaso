services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  elpaso:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - MCP_TRANSPORT=streamable-http
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./mcp_server:/app/mcp_server
      - ./pipeline:/app/pipeline
      - ./config.yaml:/app/config.yaml
    command: ["watchmedo", "auto-restart", "--directory=/app/mcp_server", "--directory=/app/pipeline", "--pattern=*.py;*.yaml", "--recursive", "--", "python", "mcp_server/server.py"]
    depends_on:
      - qdrant
    restart: unless-stopped

  inspector:
    # MCP Inspector for testing El Paso tools.
    # Connect in the UI with: Transport=Streamable HTTP, URL=http://elpaso:8080/mcp
    image: ghcr.io/modelcontextprotocol/inspector:latest
    ports:
      - "6274:6274"
      - "6277:6277"
    environment:
      - HOST=0.0.0.0
      - MCP_AUTO_OPEN_ENABLED=false
      - DANGEROUSLY_OMIT_AUTH=true
      - MCP_SERVER_URL=http://elpaso:8080/mcp
    depends_on:
      - elpaso
    restart: unless-stopped

