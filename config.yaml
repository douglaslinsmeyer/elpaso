qdrant:
  collection_name: el_paso

embedding:
  model: nomic-embed-text

llm:
  model: qwen3:8b

confluence:
  spaces:
    - ISS

github:
  repo_prefix: "mes-"
  issue_lookback_months: 12
  code_extensions:
    - ".cs"
  skip_patterns:
    - "**/obj/**"
    - "**/bin/**"
    - "*.Designer.cs"
    - "*.AssemblyInfo.cs"
    - "**/Migrations/**"

chunking:
  chunk_size: 512
  chunk_overlap: 50

retrieval:
  top_k: 8

search:
  default_mode: semantic
  code_default_mode: hybrid
  rrf_k: 60
